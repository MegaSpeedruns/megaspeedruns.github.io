<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MST3 - Mega Speedruns</title>
<link rel="stylesheet" href="styles.css">
<link rel="shortcut icon" type="image/x-icon" href="Mega%20Speedruns_files/logo.png" />
<style>
    body {
        background: url('Mega%20Speedruns_files/bg.png') no-repeat center center fixed;
        background-size: cover;
    }

    .state-message {
        max-width: 500px;
        margin: 60px auto;
        text-align: center;
        padding: 30px;
        font-size: 1.05em;
        line-height: 1.6;
        background-color: rgba(18, 18, 26, 0.6);
        border-radius: 16px;
    }

    .state-message a {
        color: #8fb2ff;
    }
</style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="Mega%20Speedruns_files/logo.png" alt="Logo">
        </div>
        <nav class="nav-wrapper">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="MSTLP.htm">Level Packs</a></li>
                <li><a href="MMMLevels.htm">MMM Levels</a></li>
                <li><a href="Speedruns.htm">Speedruns</a></li>
                <li><a id="Forums" href="Forum.html">Forums</a></li>
                <li><a id="login" href="Login.html">Login</a></li>
                <li><a href="Creator.html">Creator</a></li>
                <li><a href="Users.html">Users</a></li>
            </ul>
        </nav>
    </header>

    <div id="state-checking" class="state-message">
        Checking your account&hellip;
    </div>

    <div id="state-no-access" class="state-message" style="display:none;">
        This is a page for MST Tournament creators.<br><br>

        <span id="clearance-line">Login to check Creator clearance.</span><br><br>

        Reach out to SkyPilotSamurai on Discord if you are an MST Creator and would like access.
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="auth.js"></script>

    <script>
    // This page ships with NO creator app code. The app script is stored in
    // the Firebase database at "mst3Script/code", which is only readable by
    // accounts with canUpload === true (enforced by database security rules).
    // Everyone else gets the nav bar, the background, and a state message.
    const loginLink = document.getElementById("login");
    const stateChecking = document.getElementById("state-checking");
    const stateNoAccess = document.getElementById("state-no-access");
    const clearanceLine = document.getElementById("clearance-line");

    function showState(el) {
        [stateChecking, stateNoAccess].forEach(s => s.style.display = "none");
        if (el) el.style.display = "block";
    }

    function showNoAccess(loggedIn) {
        clearanceLine.textContent = loggedIn
            ? "Your account doesn't have Creator clearance."
            : "Login to check Creator clearance.";
        showState(stateNoAccess);
    }

    async function loadCreatorApp(user) {
        try {
            if (!window.initMST3App) {
                const snap = await db.ref("mst3Script/code").once("value");
                const code = snap.val();
                if (!code) {
                    console.error("Creator app script not found in database.");
                    showNoAccess(true);
                    return;
                }
                const script = document.createElement("script");
                script.textContent = code;
                document.body.appendChild(script);
            }
            if (window.initMST3App) {
                showState(null);
                window.initMST3App(user.uid);
            }
        } catch (err) {
            console.error("Failed to load creator app:", err);
            showNoAccess(true);
        }
    }

    window.addEventListener("DOMContentLoaded", () => {
        const storedName = localStorage.getItem("username");
        if (storedName) {
            loginLink.textContent = "Profile";
            loginLink.href = "Profile.html";
        } else {
            loginLink.textContent = "Login";
            loginLink.href = "Login.html";
        }

        showState(stateChecking);

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                loginLink.textContent = "Login";
                loginLink.href = "Login.html";
                localStorage.removeItem("username");
                if (window.destroyMST3App) window.destroyMST3App();
                showNoAccess(false);
                return;
            }

            loginLink.textContent = "Profile";
            loginLink.href = "Profile.html";

            try {
                const snap = await db.ref("users/" + user.uid).once("value");
                const userData = snap.val() || {};
                if (userData.username) localStorage.setItem("username", userData.username);

                if (userData.canUpload === true) {
                    await loadCreatorApp(user);
                } else {
                    if (window.destroyMST3App) window.destroyMST3App();
                    showNoAccess(true);
                }
            } catch (err) {
                console.error("Failed to check upload access:", err);
                if (window.destroyMST3App) window.destroyMST3App();
                showNoAccess(true);
            }
        });
    });
    </script>
</body>
</html>
