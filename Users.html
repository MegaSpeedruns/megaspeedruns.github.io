<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users - Mega Speedruns</title>
<link rel="stylesheet" href="styles.css">
<link rel="shortcut icon" type="image/x-icon" href="Mega%20Speedruns_files/logo.png" />
<style>
  main {
    padding: 2rem 1rem;
    flex: 1;
  }

  .users-container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .users-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .users-header h1 {
    color: #f97316;
    font-size: 2.5em;
    margin-bottom: 0.5rem;
  }

  .users-header p {
    color: #cbd5e1;
    font-size: 1.1em;
  }

  .search-container {
    margin-bottom: 2rem;
    display: flex;
    justify-content: center;
  }

  #search-bar {
    width: 100%;
    max-width: 500px;
    padding: 12px 16px;
    border-radius: 8px;
    border: 2px solid #475569;
    background-color: #182234;
    color: #f1f5f9;
    font-size: 15px;
    transition: all 0.2s ease;
    outline: none;
    font-family: inherit;
  }

  #search-bar:focus {
    border-color: #2563eb;
    background-color: #1c2739;
    box-shadow: 0 0 12px rgba(37, 99, 235, 0.4);
  }

  #search-bar::placeholder {
    color: #94a3b8;
  }

  .user-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .user-item {
    --user-color: #2563eb;
    background: linear-gradient(135deg, #182234 0%, #121c2e 100%);
    border: 1px solid #475569;
    border-radius: 12px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .user-item:hover {
    border-color: var(--user-color);
    background: linear-gradient(135deg, #1b2538 0%, #131d2f 100%);
    box-shadow: 0 8px 24px color-mix(in srgb, var(--user-color) 35%, transparent);
    transform: translateY(-4px);
  }

  .user-item img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin-bottom: 1rem;
    border: 3px solid #2563eb;
    object-fit: cover;
  }

  .user-name {
    font-size: 1.2em;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 0.5rem;
  }

  .user-info {
    font-size: 0.9em;
    color: #cbd5e1;
    margin-bottom: 0.3rem;
  }

  .user-badge {
    display: inline-block;
    background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8em;
    margin-top: 0.5rem;
  }

  @media (max-width: 768px) {
    .user-list {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .users-header h1 {
      font-size: 2em;
    }
  }

  @media (max-width: 480px) {
    .user-list {
      grid-template-columns: 1fr;
    }

    #search-bar {
      padding: 10px 12px;
    }
  }
</style>
<link rel="shortcut icon" type="image/x-icon" href="Mega%20Speedruns_files/logo.png" />
</head>
<body>
<header>
    <div class="header-container">
        <div class="logo">
            <img src="Mega%20Speedruns_files/logo.png" alt="Mega Speedruns Logo">
            <span class="logo-text">Mega Speedruns</span>
        </div>
        <nav class="nav-wrapper">
            <ul>
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="MSTLP.html" class="nav-link">Level Packs</a></li>
                <li><a href="MMMLevels.html" class="nav-link">MMM Levels</a></li>
                <li><a href="Speedruns.html" class="nav-link">Speedruns</a></li>
                <li><a href="Forum.html" class="nav-link">Forums</a></li>
                <li><a href="Creator.html" class="nav-link">Creator</a></li>
                <li><a href="Users.html" class="nav-link active">Users</a></li>
                <li><a id="login" href="Login.html" class="nav-link">Login</a></li>
                <li id="messages-nav-item" style="display:none;"><a href="Messages.html" class="nav-link">Messages</a></li>
            </ul>
        </nav>
    </div>
</header>
<main>
  <div class="users-container">
    <div class="users-header">
      <h1>Community Members</h1>
    </div>

    <div class="search-container">
      <input
        type="text"
        id="search-bar"
        placeholder="Search for a user..."
      >
    </div>

    <div class="user-list" id="user-list"></div>
  </div>
</main>

<footer>
    <div class="footer-content">
        <p>&copy; 2022 Mega Speedruns. All rights reserved.</p>
    </div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2pHhSThFkKhN-c1sdhUATt1-zmNLV9sw",
    authDomain: "megaspeedrunsdatabase.firebaseapp.com",
    databaseURL: "https://megaspeedrunsdatabase-default-rtdb.firebaseio.com",
    projectId: "megaspeedrunsdatabase",
    storageBucket: "megaspeedrunsdatabase.firebasestorage.app",
    messagingSenderId: "545413984550",
    appId: "1:545413984550:web:79c899026a21f6343091e7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const loginEl = document.getElementById("login");
  const userListDiv = document.getElementById("user-list");
  const searchInput = document.getElementById("search-bar");

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        const snapshot = await get(ref(db, "users/" + user.uid));
        const username = snapshot.val()?.username || "Profile";
        loginEl.textContent = "Profile";
        loginEl.href = "Profile.html";
        localStorage.setItem("username", username);
      } catch (err) {
        console.error("Failed to fetch username:", err);
        loginEl.textContent = "Login";
        loginEl.href = "Login.html";
      }
    } else {
      loginEl.textContent = "Login";
      loginEl.href = "Login.html";
      localStorage.removeItem("username");
    }
  });

  async function loadUsers() {
    try {
      const snapshot = await get(ref(db, 'users'));
      const users = snapshot.val();
      if (!users) {
        userListDiv.innerHTML += "<p>No users found.</p>";
        return;
      }

      const sortedUsers = Object.entries(users).sort((a, b) => {
        const usernameA = (a[1].username || "").toLowerCase();
        const usernameB = (b[1].username || "").toLowerCase();
        return usernameA.localeCompare(usernameB);
      });

      sortedUsers.forEach(([uid, user]) => {
        const userItem = document.createElement("div");
        userItem.className = "user-item";

        const usernameColor = user.usernameColor || "#64748b";
        userItem.style.setProperty("--user-color", usernameColor);
        const imgSrc = user.profileImageURL
          ? user.profileImageURL + (user.profileImageURL.includes("?") ? "&" : "?") + "t=" + new Date().getTime()
          : "Mega%20Speedruns_files/Default_Avatar.png";

        userItem.innerHTML = `
          <img src="${imgSrc}" alt="${user.username}">
          <span style="color: ${usernameColor};">${user.username}</span>
        `;

        const img = userItem.querySelector("img");
        img.style.border = `3px solid ${usernameColor}`;
        img.style.objectFit = "cover";
        img.onerror = () => {
          img.src = 'Mega%20Speedruns_files/Default_Avatar.png';
        };

        userItem.addEventListener('click', () => {
          window.location.href = `Profile.html?uid=${uid}`;
        });

        userListDiv.appendChild(userItem);
      });

      searchInput.addEventListener("input", () => {
        const query = searchInput.value.toLowerCase();
        const userItems = document.querySelectorAll(".user-item");

        userItems.forEach(item => {
          const username = item.querySelector("span").textContent.toLowerCase();
          item.style.display = username.includes(query) ? "flex" : "none";
        });
      });
    } catch (err) {
      console.error("Failed to load users:", err);
    }
  }

  loadUsers();
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
    const loginEl = document.getElementById("login");
    const cachedUsername = localStorage.getItem("username");
    if (cachedUsername) {
        loginEl.textContent = `Profile`;
        loginEl.href = "Profile.html";
    } else {
        loginEl.textContent = "Login";
        loginEl.href = "Login.html";
    }
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            try {
                const snapshot = await db.ref("users/" + user.uid).once("value");
                const username = snapshot.val()?.username || "Login";
                loginEl.textContent = `Profile`;
                loginEl.href = "Profile.html";
                localStorage.setItem("username", username);
            } catch (err) {
                console.error("Failed to fetch username:", err);
                loginEl.textContent = "Login";
                loginEl.href = "Login.html";
            }
        } else {
            loginEl.textContent = "Login";
            loginEl.href = "Login.html";
            localStorage.removeItem("username");
        }
    });
});
</script>
<script src="dm-crypto.js"></script>
<script src="nav.js"></script>
</body>
</html>
