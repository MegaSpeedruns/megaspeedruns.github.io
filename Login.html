<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mega Speedruns</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" type="image/x-icon" href="Mega%20Speedruns_files/logo.png" />
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="Mega%20Speedruns_files/logo.png" alt="Mega Speedruns Logo">
                <span class="logo-text">Mega Speedruns</span>
            </div>
            <nav class="nav-wrapper">
                <ul>
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="MSTLP.htm" class="nav-link">Level Packs</a></li>
                    <li><a href="MMMLevels.htm" class="nav-link">MMM Levels</a></li>
                    <li><a href="Speedruns.htm" class="nav-link">Speedruns</a></li>
                    <li><a href="Forum.html" class="nav-link">Forums</a></li>
                    <li><a href="Creator.html" class="nav-link">Creator</a></li>
                    <li><a href="Users.html" class="nav-link">Users</a></li>
                    <li><a id="login" href="Login.html" class="nav-link">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="shadow-box-smaller">
        <h2>Login</h2>
        <br>
        <input type="email" id="login-email" placeholder="Email" autocomplete="email" required><br><br>
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required><br><br>
        <button type="button" id="login-btn">Login</button><br><br>
        <h2>Sign Up</h2>
        <br>
        <input type="text" id="signup-username" placeholder="Username" autocomplete="username" required><br><br>
        <input type="email" id="signup-email" placeholder="Email" autocomplete="email" required><br><br>
        <input type="password" id="signup-password" placeholder="Password" autocomplete="new-password" required><br><br>
        <button type="button" id="signup-btn">Sign Up</button><br><br>
        <p id="status" role="status"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="auth.js"></script>
    <script src="nav.js"></script>

    <script>
    const statusEl = document.getElementById("status");
    function setStatus(msg) { statusEl.textContent = msg; }

    async function login() {
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        if (!email || !password) {
            setStatus("Please enter your email and password.");
            return;
        }
        setStatus("Logging in...");

        try {
            const { user } = await auth.signInWithEmailAndPassword(email, password);
            const snapshot = await db.ref("users/" + user.uid).once("value");
            const username = snapshot.val()?.username || "Unknown";

            localStorage.setItem("username", username);
            setStatus(`Welcome ${username}`);
            window.location.href = "Profile.html";
        } catch (err) {
            setStatus(err.message);
        }
    }

    async function signUp() {
        const username = document.getElementById("signup-username").value.trim();
        const email = document.getElementById("signup-email").value.trim();
        const password = document.getElementById("signup-password").value;

        if (!username) {
            setStatus("Please enter a username!");
            return;
        }
        if (!email || !password) {
            setStatus("Please enter an email and password.");
            return;
        }
        setStatus("Checking username...");

        try {
            const usernameLower = username.toLowerCase();
            const snapshot = await db.ref("users")
                .orderByChild("username_lower")
                .equalTo(usernameLower)
                .once("value");

            if (snapshot.exists()) {
                setStatus("⚠️ Username already taken. Please choose another.");
                return;
            }

            setStatus("Creating account...");

            const { user } = await auth.createUserWithEmailAndPassword(email, password);
            await db.ref("users/" + user.uid).set({
                username: username,
                username_lower: usernameLower,
                email: user.email
            });

            localStorage.setItem("username", username);
            setStatus(`Account created! Welcome ${username}`);
            window.location.href = "Profile.html";
        } catch (err) {
            setStatus(err.message);
        }
    }

    document.getElementById("login-btn").addEventListener("click", login);
    document.getElementById("signup-btn").addEventListener("click", signUp);
    document.getElementById("login-password").addEventListener("keypress", (e) => {
        if (e.key === "Enter") login();
    });
    document.getElementById("signup-password").addEventListener("keypress", (e) => {
        if (e.key === "Enter") signUp();
    });

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            try {
                const snapshot = await db.ref("users/" + user.uid).once("value");
                const username = snapshot.val()?.username || "Unknown";
                setStatus(`Logged in as: ${username} (${user.email})`);
            } catch (err) {
                setStatus("Logged in.");
            }
        } else {
            setStatus("Not logged in");
        }
    });
    </script>

</body>
</html>
