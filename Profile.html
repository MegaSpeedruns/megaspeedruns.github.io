<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>
<link rel="stylesheet" href="styles.css">
<style>
  body {
    background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
    min-height: 100vh;
  }

  main {
    padding: 0.0rem 1rem;
    flex: 1;
  }

  .profile-container {
    max-width: 1000px;
    margin: 2rem auto;
  }

  .profile-header-title {
    color: #2563eb;
    font-size: 2.5em;
    text-align: center;
    margin-bottom: 2rem;
    text-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
  }

  .shadow {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 2rem;
    margin-bottom: 2rem;
  }

  .profile-left {
    background: linear-gradient(135deg, #1a2436 0%, #131d2f 100%);
    border: 1px solid #475569;
    border-radius: 12px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #profile-img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 4px solid #2563eb;
    margin-bottom: 1.5rem;
    object-fit: cover;
  }


  .button {
    background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    margin: 0.5rem 0;
    width: 100%;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }

  .button:hover {
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    transform: translateY(-2px);
  }

  .profile-right {
    background: linear-gradient(135deg, #1a2436 0%, #131d2f 100%);
    border: 1px solid #475569;
    border-radius: 12px;
    padding: 2rem;
  }

  .profile-header {
    border-bottom: 2px solid #2563eb;
    padding-bottom: 0.25rem;
    margin-bottom: 0.5rem;
  }

  .profile-header h1 {
    color: #60a5fa;
    font-size: 2em;
    margin: 0;
  }

  .profile-header h1 p {
    margin: 0;
  }

  #color-picker-container {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-top: 0.5rem;
    width: 100%;
  }

  #color-picker-container label {
    color: #cbd5e1;
    font-weight: 600;
  }

  #username-color {
    cursor: pointer;
    border: 2px solid #2563eb;
    border-radius: 6px;
    width: 100%;
    height: 40px;
  }

  #user-info {
    color: #cbd5e1;
    margin-bottom: 0.5rem;
    margin-top: 0;
  }

  #user-info p {
    margin: 0;
  }

  .shadow-box {
    background: linear-gradient(135deg, #1a2436 0%, #131d2f 100%);
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 2rem;
  }

  .shadow-box h2 {
    color: #2563eb;
    margin-top: 0;
  }

  #userSpeedruns {
    list-style: none;
    padding: 0;
  }

  #userSpeedruns li {
    background: #162032;
    border-left: 3px solid #2563eb;
    padding: 1rem;
    margin-bottom: 0.5rem;
    border-radius: 4px;
    color: #cbd5e1;
  }

  @media (max-width: 768px) {
    .shadow {
      grid-template-columns: 1fr;
    }

    .profile-header-title {
      font-size: 2em;
    }
  }
</style>
<link rel="shortcut icon" type="image/x-icon" href="Mega%20Speedruns_files/logo.png" />
</head>

<body>
<header>
    <div class="header-container">
        <div class="logo">
            <img src="Mega%20Speedruns_files/logo.png" alt="Mega Speedruns Logo">
            <span class="logo-text">Mega Speedruns</span>
        </div>
        <nav class="nav-wrapper">
            <ul>
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="MSTLP.htm" class="nav-link">Level Packs</a></li>
                <li><a href="MMMLevels.htm" class="nav-link">MMM Levels</a></li>
                <li><a href="Speedruns.htm" class="nav-link">Speedruns</a></li>
                <li><a href="Forum.html" class="nav-link">Forums</a></li>
                <li><a href="Creator.html" class="nav-link">Creator</a></li>
                <li><a href="Users.html" class="nav-link">Users</a></li>
                <li><a id="login" href="Login.html" class="nav-link">Profile</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
  <div class="profile-container">
    <div class="shadow">
      <div class="profile-left">
        <img id="profile-img" src="Mega%20Speedruns_files/Default_Avatar.png" alt="Profile Image">
        <input type="file" id="image-file-input" accept="image/*" style="display:none;">
        <button class="button" id="upload-image-btn">Upload Image</button>
        <p id="image-upload-status" style="font-size:0.8em; margin-top:4px; color: #cbd5e1;"></p>

        <div id="color-picker-container" style="display: none; margin-top: 0.5rem; flex-direction: column; gap: 0.75rem; width: 100%;">
          <label for="username-color" style="color: #cbd5e1; font-weight: 600;">User Color:</label>
          <input type="color" id="username-color" value="#FFFFFF" style="width: 100%; height: 40px; cursor: pointer; border: 2px solid #2563eb; border-radius: 6px;">
          <button class="button" id="save-color-btn">Save Color</button>
          <button class="button" id="logout-btn" style="background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);">Logout</button>
        </div>
      </div>

      <div class="profile-right">
        <div class="profile-header">
          <h1 id="profile">Profile Details</h1>
        </div>
        <div id="user-info"></div>
        <div id="user-runs"></div>
      </div>
    </div>

    <div class="shadow-box">
      <ul id="userSpeedruns"></ul>
    </div>
  </div>
</main>

<footer>
    <div class="footer-content">
        <p>&copy; 2022 Mega Speedruns. All rights reserved.</p>
    </div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getDatabase,
  ref,
  get,
  set,
  child
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import {
  getStorage,
  ref as storageRef,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2pHhSThFkKhN-c1sdhUATt1-zmNLV9sw",
  authDomain: "megaspeedrunsdatabase.firebaseapp.com",
  databaseURL: "https://megaspeedrunsdatabase-default-rtdb.firebaseio.com",
  projectId: "megaspeedrunsdatabase",
  storageBucket: "megaspeedrunsdatabase.firebasestorage.app",
  messagingSenderId: "545413984550",
  appId: "1:545413984550:web:79c899026a21f6343091e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

const userProfile = document.getElementById("profile");
const profileImg = document.getElementById("profile-img");
const userInfoDiv = document.getElementById("user-info");
const imageFileInput = document.getElementById("image-file-input");
const uploadImageBtn = document.getElementById("upload-image-btn");
const imageUploadStatus = document.getElementById("image-upload-status");
const loginLink = document.getElementById("login");
const logoutBtn = document.getElementById("logout-btn");

const runsContainer = document.createElement("div");
const runCountEl = document.createElement("h3");
runCountEl.className = "outline";
const userRunsList = document.createElement("ul");
runsContainer.appendChild(runCountEl);
runsContainer.appendChild(userRunsList);
document.querySelector(".shadow-box").appendChild(runsContainer);

uploadImageBtn.addEventListener("click", () => imageFileInput.click());

async function urlSetImage(url) {
  const user = auth.currentUser;
  if (!user) return;

  try {
    const sep = url.includes("?") ? "&" : "?";
    profileImg.src = url + sep + "t=" + new Date().getTime();

    await set(ref(db, "users/" + user.uid + "/profileImageURL"), url);
  } catch (err) {
    console.error("Failed to save image URL:", err);
    imageUploadStatus.textContent = "Upload failed. Please try again.";
  }
}

imageFileInput.addEventListener("change", async () => {
  const file = imageFileInput.files[0];
  if (!file) return;

  const user = auth.currentUser;
  if (!user) {
    alert("You need to be logged in to upload a profile image.");
    return;
  }

  uploadImageBtn.disabled = true;
  imageUploadStatus.textContent = "Uploading...";

  try {
    const ext = file.name.split(".").pop();
    const fileRef = storageRef(storage, "profileImages/" + user.uid + "/avatar." + ext);
    await uploadBytes(fileRef, file);
    const url = await getDownloadURL(fileRef);
    urlSetImage(url);
    imageUploadStatus.textContent = "Uploaded!";
  } catch (err) {
    console.error("Failed to upload image:", err);
    imageUploadStatus.textContent = "Upload failed. Please try again.";
  } finally {
    uploadImageBtn.disabled = false;
    imageFileInput.value = "";
  }
});

function linkify(text) {
  const urlPattern = /(\bhttps?:\/\/[^\s]+)/gi;
  return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
}

const urlParams = new URLSearchParams(window.location.search);
const profileUidFromUrl = urlParams.get("uid");

onAuthStateChanged(auth, async (user) => {
  const urlParams = new URLSearchParams(window.location.search);
  const uidToView = urlParams.get("uid");

  if (user) {
    loginLink.innerText = "Profile";
    loginLink.href = `Profile.html?uid=${user.uid}`;
    logoutBtn.style.display = "inline-block";
  } else {
    loginLink.innerText = "Login";
    loginLink.href = "Login.html";
    logoutBtn.style.display = "none";
  }

  if (!uidToView && user) {
    const newUrl = `${window.location.pathname}?uid=${user.uid}`;
    window.history.replaceState({}, "", newUrl);
  }

  const profileUid = urlParams.get("uid") || (user ? user.uid : null);
  if (!profileUid) {
    userProfile.innerText = "No profile selected.";
    return;
  }

  try {
    const snapshot = await get(ref(db, "users/" + profileUid));
    const userData = snapshot.val();

    if (!userData) {
      userProfile.innerText = "User not found";
      userInfoDiv.innerHTML = "";
      return;
    }

    const usernameColor = userData.usernameColor || "#FFFFFF";
    userProfile.innerHTML = `<p style="color:${usernameColor}">${userData.username}'s Profile</p>`;

    const profileLeft = document.querySelector(".profile-left");
    const profileRight = document.querySelector(".profile-right");
    const profileImg = document.getElementById("profile-img");
    const profileHeader = document.querySelector(".profile-header");
    const profileTitle = document.querySelector(".profile-header-title");

    profileImg.style.borderColor = usernameColor;
    profileLeft.style.borderColor = usernameColor;
    profileRight.style.borderColor = usernameColor;
    profileHeader.style.borderBottomColor = usernameColor;
    if (profileTitle) profileTitle.style.color = usernameColor;

    document.getElementById("upload-image-btn").style.background = `linear-gradient(135deg, ${usernameColor} 0%, ${adjustBrightness(usernameColor, -20)} 100%)`;

    document.querySelectorAll(".shadow-box").forEach(box => {
      const h2 = box.querySelector("h2");
      if (h2) h2.style.color = usernameColor;
    });

    const style = document.createElement("style");
    style.textContent = `
      .img-input:focus { border-color: ${usernameColor} !important; box-shadow: 0 0 8px ${usernameColor}33 !important; }
      .button { background: linear-gradient(135deg, ${usernameColor} 0%, ${adjustBrightness(usernameColor, -20)} 100%) !important; }
      .button:hover { box-shadow: 0 4px 12px ${usernameColor}66 !important; }
      #username-color { border-color: ${usernameColor} !important; }
    `;
    document.head.appendChild(style);

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? [parseInt(result[1], 16), parseInt(result[2], 16), parseInt(result[3], 16)] : [255, 255, 255];
    }

    function adjustBrightness(hex, percent) {
      const rgb = hexToRgb(hex);
      const adjusted = rgb.map(val => Math.max(0, Math.min(255, val + percent)));
      return "#" + adjusted.map(x => x.toString(16).padStart(2, '0')).join('');
    }

    if (userData.profileImageURL) {
      const sep = userData.profileImageURL.includes("?") ? "&" : "?";
      profileImg.src = userData.profileImageURL + sep + "t=" + new Date().getTime();
    }

    userInfoDiv.innerHTML = `<p id="bio-text">${userData.bio ? userData.bio.replace(/\n/g, "<br>") : ""}</p>`;

    if (user && profileUid === user.uid) {
      colorPickerContainer.style.display = "block";
      usernameColorInput.value = usernameColor;

      saveColorBtn.onclick = async () => {
        const newColor = usernameColorInput.value;
        await set(ref(db, "users/" + user.uid + "/usernameColor"), newColor);
        userProfile.innerHTML = `<p style="color:${newColor}">${userData.username}'s Profile</p><br>`;

        profileImg.style.borderColor = newColor;
        profileLeft.style.borderColor = newColor;
        profileRight.style.borderColor = newColor;
        profileHeader.style.borderBottomColor = newColor;
        const profileTitle = document.querySelector(".profile-header-title");
        if (profileTitle) profileTitle.style.color = newColor;

        document.getElementById("upload-image-btn").style.background = `linear-gradient(135deg, ${newColor} 0%, ${adjustBrightness(newColor, -20)} 100%)`;

        document.querySelectorAll(".shadow-box").forEach(box => {
          const h2 = box.querySelector("h2");
          if (h2) h2.style.color = newColor;
        });

        const style = document.createElement("style");
        style.textContent = `
          .img-input:focus { border-color: ${newColor} !important; box-shadow: 0 0 8px ${newColor}33 !important; }
          .button { background: linear-gradient(135deg, ${newColor} 0%, ${adjustBrightness(newColor, -20)} 100%) !important; }
          .button:hover { box-shadow: 0 4px 12px ${newColor}66 !important; }
          #username-color { border-color: ${newColor} !important; }
        `;
        document.head.appendChild(style);
      };

      const bioInput = document.createElement("textarea");
      bioInput.id = "bio-input";
      bioInput.style.width = "100%";
      bioInput.style.height = "60px";
      bioInput.value = userData.bio || "";
      bioInput.className = "bio-input";
      bioInput.style.display = "none";
      userInfoDiv.appendChild(bioInput);

      const bioBtn = document.createElement("button");
      bioBtn.className = "button";
      bioBtn.id = "bio-btn";
      bioBtn.innerText = "Edit Profile";
      userInfoDiv.appendChild(bioBtn);

      const bioText = document.getElementById("bio-text");
      bioBtn.addEventListener("click", async () => {
        if (bioBtn.innerText === "Edit Profile") {
          bioInput.style.display = "block";
          bioBtn.innerText = "Save";
        } else {
          const newBio = bioInput.value.trim();
          await set(ref(db, "users/" + user.uid + "/bio"), newBio);
          bioText.innerHTML = newBio ? newBio.replace(/\n/g, "<br>") : "No bio set.";
          bioInput.style.display = "none";
          bioBtn.innerText = "Edit Profile";
        }
      });
    } else {
      colorPickerContainer.style.display = "none";
      uploadImageBtn.style.display = "none";
      imageUploadStatus.style.display = "none";
    }

    const dbRef = ref(db);
    const speedrunSnapshot = await get(child(dbRef, "SpeedRunner/"));

    if (speedrunSnapshot.exists()) {
      const data = speedrunSnapshot.val();
      const totalRuns = Number(data.RunNum) || 0;
      let matchCount = 0;

      const loggedInUser = (userData.username || "").replace(/_/g, " ").trim().toLowerCase();
      const userNickname = (userData.nickname || "").replace(/_/g, " ").trim().toLowerCase();

      userRunsList.innerHTML = "";

      for (let i = 1; i <= totalRuns; i++) {
        const runData = data[i];
        if (!runData) continue;

        const runnerName = (runData.Runner || "").replace(/_/g, " ").trim().toLowerCase();
        if (runnerName === loggedInUser || runnerName === userNickname) {
          matchCount++;

          const list = document.createElement("li");
          list.setAttribute("class", "spacing");

          const level = runData.Run.replace(/_/g, " ");
          const time = runData.Time.replace(/^0+:?/, "").replace(/^0+/, "");
          const link = runData.Link;
          const tournament = runData.Tournament;
          const levelLabel = level.includes("Week") ? "LevelPack" : "Level";

          list.innerHTML = `
            <img src="Mega%20Speedruns_files/${tournament}SS/${runData.Run}.png" alt="${level}" class="imgResize">
            <span>${levelLabel}: ${level}</span>
            <span>Time: ${time}</span>
            <span><a href="${link}" target="_blank">Watch Run</a></span>
          `;

          userRunsList.appendChild(list);
        }
      }

      runCountEl.innerText = `Speedruns - Runs Submitted: ${matchCount}`;
    } else {
      runCountEl.innerText = "Speedruns - Runs Submitted: 0";
    }
  } catch (err) {
    console.error("Failed to load profile:", err);
  }
});


logoutBtn.addEventListener("click", async () => {
  try {
    await signOut(auth);
    window.location.href = "Login.html";
  } catch (err) {
    console.error("Logout failed:", err);
    alert("Failed to log out. Try again.");
  }
});

profileImg.onerror = () => {
    profileImg.src = 'Mega Speedruns_files/Default_Avatar.png';
};
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
    const loginEl = document.getElementById("login");
    const cachedUsername = localStorage.getItem("username");
    if (cachedUsername) {
        loginEl.textContent = `Profile`;
        loginEl.href = "Profile.html";
    } else {
        loginEl.textContent = "Login";
        loginEl.href = "Login.html";
    }
});

const usernameColorInput = document.getElementById("username-color");
const saveColorBtn = document.getElementById("save-color-btn");
const colorPickerContainer = document.getElementById("color-picker-container");
</script>

</body>
</html>
