<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Thread</title>
<link rel="stylesheet" href="styles.css">
<style>
    body {
        --user-color: #2563eb;
        background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        color: #f1f5f9;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    main {
        max-width: 900px;
        margin: 2rem auto;
        padding: 2rem;
        flex: 1;
        width: 100%;
    }

    h1 {
        color: var(--user-color);
        margin-bottom: 1.5rem;
        font-size: 2em;
        text-shadow: 0 2px 8px color-mix(in srgb, var(--user-color) 30%, transparent);
    }

    .post {
        --user-color: #2563eb;
        background: linear-gradient(135deg, #1a2436 0%, #131d2f 100%);
        border: 1px solid var(--user-color);
        border-left: 4px solid var(--user-color);
        padding: 1.5rem;
        border-radius: 12px;
        margin-bottom: 2rem;
    }

    .post-author {
        font-weight: 600;
        margin-bottom: 1rem;
    }

    .replies {
        margin-top: 2rem;
    }

    .replies h2 {
        color: var(--user-color);
        font-size: 1.3em;
    }

    .reply {
        --user-color: #2563eb;
        background: linear-gradient(135deg, #111b2e 0%, #0f172a 100%);
        border-left: 3px solid var(--user-color);
        padding: 1rem;
        margin-top: 1rem;
        border-radius: 8px;
    }

    .reply-box {
        --user-color: #2563eb;
        display: none;
        margin-top: 1.5rem;
        background: linear-gradient(135deg, #182234 0%, #121c2e 100%);
        padding: 1.5rem;
        border-radius: 12px;
        border: 1px solid var(--user-color);
    }

    .input {
        width: 100%;
        padding: 0.75rem;
        border-radius: 6px;
        border: 2px solid var(--user-color);
        background-color: #131520;
        color: #f1f5f9;
        margin-bottom: 1rem;
        font-family: inherit;
        transition: all 0.2s;
        box-sizing: border-box;
    }

    .input:focus {
        border-color: var(--user-color);
        background-color: #1d1d28;
        box-shadow: 0 0 8px color-mix(in srgb, var(--user-color) 30%, transparent);
        outline: none;
    }

    button {
        padding: 0.75rem 1.5rem;
        background: linear-gradient(135deg, var(--user-color) 0%, color-mix(in srgb, var(--user-color) 70%, black) 100%);
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        font-family: inherit;
        font-size: 0.95em;
    }

    button:hover {
        background: linear-gradient(135deg, var(--user-color) 0%, color-mix(in srgb, var(--user-color) 70%, black) 100%);
        box-shadow: 0 4px 12px color-mix(in srgb, var(--user-color) 40%, transparent);
        transform: translateY(-2px);
    }

    .remove-btn {
        background: rgba(148, 163, 184, 0.25);
        color: #cbd5e1;
        border: 1px solid rgba(148, 163, 184, 0.5);
        border-radius: 999px;
        padding: 0;
        width: 22px;
        height: 22px;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s ease;
    }

    .remove-btn:hover {
        background: rgba(148, 163, 184, 0.4);
        box-shadow: none;
        transform: none;
    }

    .remove-btn.small {
        width: 18px;
        height: 18px;
        font-size: 0.9em;
    }

    #login-warning {
        color: #ff5555;
        font-weight: bold;
        text-align: center;
        margin-top: 2rem;
        background: linear-gradient(135deg, #271d2e 0%, #221a2b 100%);
        padding: 1rem;
        border-radius: 8px;
        border-left: 3px solid #ff5555;
    }

    @media (max-width: 768px) {
        main {
            margin: 1rem;
            padding: 1rem;
        }

        h1 {
            font-size: 1.5em;
        }

        .post, .reply-box {
            padding: 1rem;
        }
    }
</style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="Mega%20Speedruns_files/logo.png" alt="Mega Speedruns Logo">
                <span class="logo-text">Mega Speedruns</span>
            </div>
            <nav class="nav-wrapper">
                <ul>
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="MSTLP.html" class="nav-link">Level Packs</a></li>
                    <li><a href="MMMLevels.html" class="nav-link">MMM Levels</a></li>
                    <li><a href="Speedruns.html" class="nav-link">Speedruns</a></li>
                    <li><a href="Forum.html" class="nav-link">Forums</a></li>
                    <li><a href="Creator.html" class="nav-link">Creator</a></li>
                    <li><a href="Users.html" class="nav-link">Users</a></li>
                    <li><a id="login" href="Login.html" class="nav-link">Login</a></li>
                    <li id="messages-nav-item" style="display:none;"><a href="Messages.html" class="nav-link">Messages</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <h1 id="thread-title">Loading...</h1>
        <div class="post">
            <div class="post-author" id="thread-author"></div>
            <p id="thread-content"></p>
        </div>

        <div class="replies" id="replies"></div>

        <div id="reply-box" class="reply-box">
            <textarea id="reply-input" class="input" rows="3" placeholder="Write your reply..."></textarea>
            <button onclick="postReply()">Post Reply</button>
        </div>

        <div id="login-warning" style="display: none;">
            Please log in to reply to this thread.
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2022 Mega Speedruns. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="auth.js"></script>
    <script src="dm-crypto.js"></script>
<script src="nav.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category");
    const threadId = params.get("id");
    const titleEl = document.getElementById("thread-title");
    const authorEl = document.getElementById("thread-author");
    const contentEl = document.getElementById("thread-content");
    const repliesEl = document.getElementById("replies");
    const replyBox = document.getElementById("reply-box");
    const loginWarning = document.getElementById("login-warning");

let currentUser = null;

auth.onAuthStateChanged(async (user) => {
    currentUser = user;
    if (user) {
        replyBox.style.display = "block";
        loginWarning.style.display = "none";

        try {
            const snapshot = await db.ref("users/" + user.uid).once("value");
            const myColor = snapshot.val()?.usernameColor;
            replyBox.style.setProperty("--user-color", myColor || "#2563eb");
            repliesEl.style.setProperty("--user-color", myColor || "#2563eb");
        } catch (err) {
            console.error("Failed to fetch logged-in user's color:", err);
        }
    } else {
        replyBox.style.display = "none";
        loginWarning.style.display = "block";
    }
});

async function getUsernameColor(username) {
    if (!username) {
        console.warn("No username provided to getUsernameColor");
        return "#64748b";
    }

    try {
        const snapshot = await db.ref("users")
            .orderByChild("username")
            .equalTo(username)
            .once("value");

        if (!snapshot.exists()) {
            console.warn(`No user found with username: ${username}`);
            return "#64748b";
        }

        let color = "#64748b";

        snapshot.forEach(child => {
            const data = child.val();
            if (data.usernameColor) {
                color = data.usernameColor.startsWith("#")
                    ? data.usernameColor
                    : `#${data.usernameColor}`;
            }
        });

        return color;

    } catch (error) {
        console.error("Error fetching username color:", error);
        return "#64748b";
    }
}

async function getUserProfile(username) {
    if (!username) {
        console.warn("No username provided to getUserProfile");
        return { profileImage: "Default_Avatar.png", uid: null };
    }

    try {
        const snapshot = await db.ref("users")
            .orderByChild("username")
            .equalTo(username)
            .once("value");

        if (!snapshot.exists()) {
            console.warn(`No user found for: ${username}`);
            return { profileImage: "Default_Avatar.png", uid: null };
        }

        let profileImage = "Default_Avatar.png";
        let uid = null;

        snapshot.forEach(child => {
            const data = child.val();
            uid = child.key;

            if (data.profileImageURL && data.profileImageURL.trim() !== "") {
                profileImage = data.profileImageURL;
            }
        });

        return { profileImage, uid };

    } catch (error) {
        console.error("Error fetching profile:", error);
        return { profileImage: "Default_Avatar.png", uid: null };
    }
}

async function loadThread() {
    const snapshot = await db.ref(`forum/${category}/${threadId}`).once("value");
    const data = snapshot.val();
    titleEl.textContent = data.title;

    const color = await getUsernameColor(data.author);
    const { profileImage, uid } = await getUserProfile(data.author);

    document.body.style.setProperty("--user-color", color);
    document.querySelector(".post").style.setProperty("--user-color", color);

    authorEl.innerHTML = `
        <div id="thread-author-row" style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <div style="display:flex;align-items:center;gap:10px;">
                <a href="Profile.html?uid=${uid || ''}" style="text-decoration:none;">
                    <img src="${profileImage}" alt="${data.author}"
                        style="width:40px;height:40px;border-radius:50%;border:2px solid ${color};object-fit:cover;cursor:pointer;">
                </a>
                <a href="Profile.html?uid=${uid || ''}"
                    style="color:${color};font-weight:bold;text-decoration:none;cursor:pointer;">
                    ${data.author}
                </a>
            </div>
        </div>
    `;

    const currentUsername = localStorage.getItem("username");
if (currentUsername && currentUsername === data.author) {
    const deleteThreadBtn = document.createElement("button");
    deleteThreadBtn.className = "remove-btn";
    deleteThreadBtn.textContent = "×";
    deleteThreadBtn.title = "Delete thread";

    deleteThreadBtn.onclick = async () => {
        const confirmDelete = confirm("Are you sure you want to delete this thread?");
        if (!confirmDelete) return;
        try {
            await db.ref(`forum/${category}/${threadId}`).remove();
            alert("Thread deleted successfully.");
            window.location.href = "Forum.html";
        } catch (err) {
            console.error("Failed to delete thread:", err);
            alert("Failed to delete thread. Try again.");
        }
    };

    authorEl.querySelector("#thread-author-row").appendChild(deleteThreadBtn);
}

    contentEl.textContent = data.content;
    loadReplies();
}


async function loadReplies() {
    repliesEl.innerHTML = "<h2>Replies</h2>";

    const snapshot = await db.ref(`forum/${category}/${threadId}/replies`).once("value");
    const replies = [];

    snapshot.forEach(child => {
        replies.push({ ...child.val(), key: child.key });
    });

    replies.sort((a, b) => a.timestamp - b.timestamp);

    const profileCache = {};

    for (const reply of replies) {
        let profileData;

        if (profileCache[reply.author]) {
            profileData = profileCache[reply.author];
        } else {
            profileData = await getUserProfile(reply.author);
            profileCache[reply.author] = profileData;
        }

        const { profileImage, uid } = profileData;
        const color = await getUsernameColor(reply.author);

        const div = document.createElement("div");
        div.classList.add("reply");
        div.style.setProperty("--user-color", color);

        div.innerHTML = `
            <div id="reply-row-${reply.key}" style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <a href="Profile.html?uid=${uid || ''}" style="text-decoration:none;">
                        <img src="${profileImage}"
                             alt="${reply.author}"
                             style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid ${color};"
                             onerror="this.onerror=null;this.src='Default_Avatar.png';">
                    </a>
                    <a href="Profile.html?uid=${uid || ''}"
                       style="color:${color};font-weight:bold;text-decoration:none;">
                        ${reply.author}
                    </a>
                </div>
            </div>
            <div style="margin-left:42px;color:#ccc;">
                ${reply.content}
            </div>
        `;

        const currentUsername = localStorage.getItem("username");
        if (currentUsername && currentUsername === reply.author) {
            const delBtn = document.createElement("button");
            delBtn.className = "remove-btn small";
            delBtn.textContent = "×";
            delBtn.title = "Delete reply";

            delBtn.onclick = async () => {
                if (!confirm("Are you sure you want to delete this reply?")) return;
                try {
                    await db.ref(`forum/${category}/${threadId}/replies/${reply.key}`).remove();
                    loadReplies();
                } catch (err) {
                    console.error("Failed to delete reply:", err);
                    alert("Failed to delete reply. Try again.");
                }
            };

            div.querySelector(`#reply-row-${reply.key}`).appendChild(delBtn);
        }

        repliesEl.appendChild(div);
    }
}

async function postReply() {
    if (!currentUser) return;

    const input = document.getElementById("reply-input");
    const content = input.value.trim();
    if (!content) return;

    const replyRef = db.ref(`forum/${category}/${threadId}/replies`).push();
    await replyRef.set({
        author: localStorage.getItem("username"),
        authorUID: currentUser.uid,
        content,
        timestamp: Date.now()
    });

    input.value = "";
    loadReplies();
}

loadThread();
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
    const loginEl = document.getElementById("login");
    const cachedUsername = localStorage.getItem("username");
    if (cachedUsername) {
        loginEl.textContent = `Profile`;
        loginEl.href = "Profile.html";
    } else {
        loginEl.textContent = "Login";
        loginEl.href = "Login.html";
    }
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            try {
                const snapshot = await db.ref("users/" + user.uid).once("value");
                const username = snapshot.val()?.username || "Login";
                loginEl.textContent = `Profile`;
                loginEl.href = "Profile.html";
                localStorage.setItem("username", username);
            } catch (err) {
                console.error("Failed to fetch username:", err);
                loginEl.textContent = "Login";
                loginEl.href = "Login.html";
            }
        } else {
            loginEl.textContent = "Login";
            loginEl.href = "Login.html";
            localStorage.removeItem("username");
        }
    });
});
</script>

</body>
</html>
