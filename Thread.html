<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Thread</title>
<link rel="stylesheet" href="styles.css">
<style>
    body {
        background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        color: #f1f5f9;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    main {
        max-width: 900px;
        margin: 2rem auto;
        padding: 2rem;
        flex: 1;
        width: 100%;
    }

    h1 {
        color: #f4511e;
        margin-bottom: 1.5rem;
        font-size: 2em;
        text-shadow: 0 2px 8px rgba(244, 81, 30, 0.3);
    }

    .post {
        background: linear-gradient(135deg, #1a2436 0%, #131d2f 100%);
        border: 1px solid #5d322f;
        padding: 1.5rem;
        border-radius: 12px;
        margin-bottom: 2rem;
    }

    .post-author {
        font-weight: 600;
        margin-bottom: 1rem;
    }

    .replies {
        margin-top: 2rem;
    }

    .replies h2 {
        color: #f4511e;
        font-size: 1.3em;
    }

    .reply {
        background: linear-gradient(135deg, #111b2e 0%, #0f172a 100%);
        border-left: 3px solid #f4511e;
        padding: 1rem;
        margin-top: 1rem;
        border-radius: 8px;
    }

    .reply-box {
        display: none;
        margin-top: 1.5rem;
        background: linear-gradient(135deg, #182234 0%, #121c2e 100%);
        padding: 1.5rem;
        border-radius: 12px;
        border: 1px solid #462d30;
    }

    .input {
        width: 100%;
        padding: 0.75rem;
        border-radius: 6px;
        border: 2px solid #5d322f;
        background-color: #131520;
        color: #f1f5f9;
        margin-bottom: 1rem;
        font-family: inherit;
        transition: all 0.2s;
        box-sizing: border-box;
    }

    .input:focus {
        border-color: #f4511e;
        background-color: #1d1d28;
        box-shadow: 0 0 8px rgba(244, 81, 30, 0.3);
        outline: none;
    }

    button {
        padding: 0.75rem 1.5rem;
        background: linear-gradient(135deg, #f4511e 0%, #d84315 100%);
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        font-family: inherit;
        font-size: 0.95em;
    }

    button:hover {
        background: linear-gradient(135deg, #ff7043 0%, #f4511e 100%);
        box-shadow: 0 4px 12px rgba(244, 81, 30, 0.4);
        transform: translateY(-2px);
    }

    #login-warning {
        color: #ff5555;
        font-weight: bold;
        text-align: center;
        margin-top: 2rem;
        background: linear-gradient(135deg, #271d2e 0%, #221a2b 100%);
        padding: 1rem;
        border-radius: 8px;
        border-left: 3px solid #ff5555;
    }

    @media (max-width: 768px) {
        main {
            margin: 1rem;
            padding: 1rem;
        }

        h1 {
            font-size: 1.5em;
        }

        .post, .reply-box {
            padding: 1rem;
        }
    }
</style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="Mega%20Speedruns_files/logo.png" alt="Mega Speedruns Logo">
                <span class="logo-text">Mega Speedruns</span>
            </div>
            <nav class="nav-wrapper">
                <ul>
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="MSTLP.htm" class="nav-link">Level Packs</a></li>
                    <li><a href="MMMLevels.htm" class="nav-link">MMM Levels</a></li>
                    <li><a href="Speedruns.htm" class="nav-link">Speedruns</a></li>
                    <li><a href="Forum.html" class="nav-link">Forums</a></li>
                    <li><a href="Creator.html" class="nav-link">Creator</a></li>
                    <li><a href="Users.html" class="nav-link">Users</a></li>
                    <li><a id="login" href="Login.html" class="nav-link">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <h1 id="thread-title">Loading...</h1>
        <div class="post">
            <div class="post-author" id="thread-author"></div>
            <p id="thread-content"></p>
        </div>

        <div class="replies" id="replies"></div>

        <div id="reply-box" class="reply-box">
            <textarea id="reply-input" class="input" rows="3" placeholder="Write your reply..."></textarea>
            <button onclick="postReply()">Post Reply</button>
        </div>

        <div id="login-warning" style="display: none;">
            Please log in to reply to this thread.
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 Mega Speedruns. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="auth.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category");
    const threadId = params.get("id");
    const titleEl = document.getElementById("thread-title");
    const authorEl = document.getElementById("thread-author");
    const contentEl = document.getElementById("thread-content");
    const repliesEl = document.getElementById("replies");
    const replyBox = document.getElementById("reply-box");
    const loginWarning = document.getElementById("login-warning");

let currentUser = null;

auth.onAuthStateChanged((user) => {
    currentUser = user;
    if (user) {
        replyBox.style.display = "block";
        loginWarning.style.display = "none";
    } else {
        replyBox.style.display = "none";
        loginWarning.style.display = "block";
    }
});

async function getUsernameColor(username) {
    if (!username) {
        console.warn("No username provided to getUsernameColor");
        return "#00e6ff"; // Fallback color
    }

    try {
        // Search for a user where username matches
        const snapshot = await db.ref("users")
            .orderByChild("username")
            .equalTo(username)
            .once("value");

        if (!snapshot.exists()) {
            console.warn(`No user found with username: ${username}`);
            return "#00e6ff"; // Default fallback
        }

        let color = "#00e6ff"; // Default if missing

        snapshot.forEach(child => {
            const data = child.val();
            if (data.usernameColor) {
                color = data.usernameColor.startsWith("#") 
                    ? data.usernameColor 
                    : `#${data.usernameColor}`;
            }
        });

        return color;

    } catch (error) {
        console.error("Error fetching username color:", error);
        return "#00e6ff"; // Fallback on error
    }
}

async function getUserProfile(username) {
    if (!username) {
        console.warn("No username provided to getUserProfile");
        return { profileImage: "Default_Avatar.png", uid: null };
    }

    try {
        // Search for a user where username matches
        const snapshot = await db.ref("users")
            .orderByChild("username")
            .equalTo(username)
            .once("value");

        if (!snapshot.exists()) {
            console.warn(`No user found for: ${username}`);
            return { profileImage: "Default_Avatar.png", uid: null };
        }

        let profileImage = "Default_Avatar.png";
        let uid = null;

        snapshot.forEach(child => {
            const data = child.val();
            uid = child.key; // Get UID from the directory name

            // Use profileImageURL instead of profileImage
            if (data.profileImageURL && data.profileImageURL.trim() !== "") {
                profileImage = data.profileImageURL;
            }
        });

        return { profileImage, uid };

    } catch (error) {
        console.error("Error fetching profile:", error);
        return { profileImage: "Default_Avatar.png", uid: null };
    }
}

async function loadThread() {
    const snapshot = await db.ref(`forum/${category}/${threadId}`).once("value");
    const data = snapshot.val();
    titleEl.textContent = data.title;

    const color = await getUsernameColor(data.author);
    const { profileImage, uid } = await getUserProfile(data.author);

    authorEl.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;">
            <a href="Profile.html?uid=${uid || ''}" style="text-decoration:none;">
                <img src="${profileImage}" alt="${data.author}" 
                    style="width:40px;height:40px;border-radius:50%;border:2px solid ${color};object-fit:cover;cursor:pointer;">
            </a>
            <a href="Profile.html?uid=${uid || ''}" 
                style="color:${color};font-weight:bold;text-decoration:none;cursor:pointer;">
                ${data.author}
            </a>
        </div>
    `;

    // Show delete button if current user's username matches thread author
    const currentUsername = localStorage.getItem("username");
if (currentUsername && currentUsername === data.author) {
    const deleteThreadBtn = document.createElement("button");
    deleteThreadBtn.textContent = "x";

    // Style as small dark grey button
    deleteThreadBtn.style.float = "right";           // Push to the right
    deleteThreadBtn.style.backgroundColor = "#444";  // Dark grey
    deleteThreadBtn.style.color = "#fff";            // White text
    deleteThreadBtn.style.padding = "5px 10px";      // Compact padding
    deleteThreadBtn.style.fontSize = "0.85rem";      // Small text
    deleteThreadBtn.style.height = "28px";           // Short height
    deleteThreadBtn.style.borderRadius = "4px";      // Rounded corners
    deleteThreadBtn.style.border = "none";           // Remove border
    deleteThreadBtn.style.cursor = "pointer";        // Pointer on hover

    // Optional hover effect
    deleteThreadBtn.onmouseover = () => deleteThreadBtn.style.backgroundColor = "#666";
    deleteThreadBtn.onmouseout = () => deleteThreadBtn.style.backgroundColor = "#444";

    deleteThreadBtn.onclick = async () => {
        const confirmDelete = confirm("Are you sure you want to delete this thread?");
        if (!confirmDelete) return;
        try {
            await db.ref(`forum/${category}/${threadId}`).remove();
            alert("Thread deleted successfully.");
            window.location.href = "Forum.html"; // Redirect back to forum
        } catch (err) {
            console.error("Failed to delete thread:", err);
            alert("Failed to delete thread. Try again.");
        }
    };

    authorEl.appendChild(deleteThreadBtn);
}

    contentEl.textContent = data.content;
    loadReplies();
}


async function loadReplies() {
    repliesEl.innerHTML = "<h2>Replies</h2>";

    const snapshot = await db.ref(`forum/${category}/${threadId}/replies`).once("value");
    const replies = [];

    snapshot.forEach(child => {
        replies.push({ ...child.val(), key: child.key });
    });

    // Sort replies by timestamp
    replies.sort((a, b) => a.timestamp - b.timestamp);

    // Cache to avoid fetching the same user multiple times
    const profileCache = {};

    for (const reply of replies) {
        let profileData;

        if (profileCache[reply.author]) {
            profileData = profileCache[reply.author];
        } else {
            profileData = await getUserProfile(reply.author);
            profileCache[reply.author] = profileData; // Save to cache
        }

        const { profileImage, uid } = profileData;
        const color = await getUsernameColor(reply.author);

        const div = document.createElement("div");
        div.classList.add("reply");

        div.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;">
                <a href="Profile.html?uid=${uid || ''}" style="text-decoration:none;">
                    <img src="${profileImage}" 
                         alt="${reply.author}" 
                         style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid ${color};"
                         onerror="this.onerror=null;this.src='Default_Avatar.png';">
                </a>
                <a href="Profile.html?uid=${uid || ''}" 
                   style="color:${color};font-weight:bold;text-decoration:none;">
                    ${reply.author}
                </a>
            </div>
            <div style="margin-left:42px;color:#ccc;">
                ${reply.content}
            </div>
        `;

        // Show delete button if current user's username matches reply author
        const currentUsername = localStorage.getItem("username");
        if (currentUsername && currentUsername === reply.author) {
            const delBtn = document.createElement("button");
            delBtn.textContent = "x";

            delBtn.style.float = "right";
            delBtn.style.backgroundColor = "#444";
            delBtn.style.color = "#fff";
            delBtn.style.padding = "3px 8px";
            delBtn.style.fontSize = "0.75rem";
            delBtn.style.height = "24px";
            delBtn.style.borderRadius = "4px";
            delBtn.style.border = "none";
            delBtn.style.cursor = "pointer";

            delBtn.onmouseover = () => delBtn.style.backgroundColor = "#666";
            delBtn.onmouseout = () => delBtn.style.backgroundColor = "#444";

            delBtn.onclick = async () => {
                if (!confirm("Are you sure you want to delete this reply?")) return;
                try {
                    await db.ref(`forum/${category}/${threadId}/replies/${reply.key}`).remove();
                    loadReplies(); // Refresh replies
                } catch (err) {
                    console.error("Failed to delete reply:", err);
                    alert("Failed to delete reply. Try again.");
                }
            };

            div.appendChild(delBtn);
        }

        repliesEl.appendChild(div);
    }
}

async function postReply() {
    if (!currentUser) return;

    const input = document.getElementById("reply-input");
    const content = input.value.trim();
    if (!content) return;

    const replyRef = db.ref(`forum/${category}/${threadId}/replies`).push();
    await replyRef.set({
        author: localStorage.getItem("username"),
        authorUID: currentUser.uid,
        content,
        timestamp: Date.now()
    });

    input.value = "";
    loadReplies();
}

loadThread();
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
    const loginEl = document.getElementById("login");
    const cachedUsername = localStorage.getItem("username");
    if (cachedUsername) {
        loginEl.textContent = `Profile`;
        loginEl.href = "Profile.html";
    } else {
        loginEl.textContent = "Login";
        loginEl.href = "Login.html";
    }
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            try {
                const snapshot = await db.ref("users/" + user.uid).once("value");
                const username = snapshot.val()?.username || "Login";
                loginEl.textContent = `Profile`;
                loginEl.href = "Profile.html";
                localStorage.setItem("username", username);
            } catch (err) {
                console.error("Failed to fetch username:", err);
                loginEl.textContent = "Login";
                loginEl.href = "Login.html";
            }
        } else {
            loginEl.textContent = "Login";
            loginEl.href = "Login.html";
            localStorage.removeItem("username");
        }
    });
});
</script>

</body>
</html>
